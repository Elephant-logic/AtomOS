services:
  - type: web
    name: atomos-studio
    runtime: node
    plan: free
    buildCommand: npm test
    startCommand: npm start
    healthCheckPath: /api/status
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
