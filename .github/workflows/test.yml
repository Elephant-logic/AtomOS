name: test
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
      - run: npm run compile:molecule -- molecular/molecules/counter.molecule.json /tmp/counter.atomic.json
